<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Triangle Swarm</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #05060a;
      touch-action: none;
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      color: rgba(255,255,255,0.8);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.4;
      background: rgba(0,0,0,0.25);
      padding: 10px 12px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="hud">
    Tap / click to generate triangles<br>
    Press C to clear
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let width = 0;
    let height = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);

    const particles = [];
    const maxParticles = 3000;

    // Hidden target shape: a circle in the middle
    let centerX = 0;
    let centerY = 0;
    let targetRadius = 0;

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      centerX = width / 2;
      centerY = height / 2;
      targetRadius = Math.min(width, height) * 0.24;
    }

    class TriangleParticle {
      constructor(x, y, angle, speed) {
        this.x = x;
        this.y = y;

        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;

        this.ax = 0;
        this.ay = 0;

        this.size = randomRange(3, 8);
        this.age = 0;
        this.maxAge = randomRange(220, 420);

        this.heading = angle;
        this.turnAmount = 0;

        this.hueOffset = randomRange(-20, 20);
      }

      update() {
        this.age += 1;

        // Reset acceleration
        this.ax = 0;
        this.ay = 0;

        // Phase 1: initial expansion burst fades with age
        const burstStrength = Math.max(0, 1 - this.age / 45);
        const burstAngle = Math.atan2(this.vy, this.vx);
        this.ax += Math.cos(burstAngle) * burstStrength * 0.03;
        this.ay += Math.sin(burstAngle) * burstStrength * 0.03;

        // Phase 2: after a short delay, get gently attracted to a circle
        if (this.age > 20) {
          const dx = this.x - centerX;
          const dy = this.y - centerY;
          const dist = Math.hypot(dx, dy) || 0.0001;

          // Nearest point on the hidden circle
          const nearestX = centerX + (dx / dist) * targetRadius;
          const nearestY = centerY + (dy / dist) * targetRadius;

          const pullX = nearestX - this.x;
          const pullY = nearestY - this.y;

          this.ax += pullX * 0.0018;
          this.ay += pullY * 0.0018;

          // Tangential flow around the circle to make it feel alive
          const tangentX = -dy / dist;
          const tangentY = dx / dist;
          this.ax += tangentX * 0.018;
          this.ay += tangentY * 0.018;
        }

        // Tiny noise/wobble so it doesn’t feel mechanical
        this.ax += randomRange(-0.006, 0.006);
        this.ay += randomRange(-0.006, 0.006);

        // Apply acceleration
        this.vx += this.ax;
        this.vy += this.ay;

        // Drag
        this.vx *= 0.985;
        this.vy *= 0.985;

        // Move
        this.x += this.vx;
        this.y += this.vy;

        // Heading / turn measurement
        const newHeading = Math.atan2(this.vy, this.vx);
        let delta = newHeading - this.heading;

        while (delta > Math.PI) delta -= Math.PI * 2;
        while (delta < -Math.PI) delta += Math.PI * 2;

        this.turnAmount = Math.abs(delta);
        this.heading = newHeading;
      }

      draw() {
        const speed = Math.hypot(this.vx, this.vy);

        // Fade in and out
        const fadeIn = Math.min(1, this.age / 20);
        const fadeOut = Math.max(0, 1 - this.age / this.maxAge);
        const alpha = fadeIn * fadeOut * 0.9;

        // Color responds to turning and speed
        const hue = 200 + Math.min(this.turnAmount * 1200, 120) + this.hueOffset;
        const lightness = 55 + Math.min(speed * 8, 20);

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.heading);

        ctx.beginPath();
        ctx.moveTo(this.size, 0);
        ctx.lineTo(-this.size * 0.8, this.size * 0.5);
        ctx.lineTo(-this.size * 0.8, -this.size * 0.5);
        ctx.closePath();

        ctx.fillStyle = `hsla(${hue}, 85%, ${lightness}%, ${alpha})`;
        ctx.fill();

        ctx.restore();
      }

      isDead() {
        return this.age > this.maxAge;
      }
    }

    function spawnBurst(x, y, count = 90) {
      for (let i = 0; i < count; i++) {
        if (particles.length >= maxParticles) {
          particles.shift();
        }

        const angle = Math.random() * Math.PI * 2;
        const speed = randomRange(0.8, 3.8);
        particles.push(new TriangleParticle(x, y, angle, speed));
      }
    }

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function animate() {
      // Slight transparency creates motion trails
      ctx.fillStyle = "rgba(5, 6, 10, 0.14)";
      ctx.fillRect(0, 0, width, height);

      // Optional guide: faint hidden circle
      ctx.beginPath();
      ctx.arc(centerX, centerY, targetRadius, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(255,255,255,0.03)";
      ctx.lineWidth = 1;
      ctx.stroke();

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        p.draw();

        if (p.isDead()) {
          particles.splice(i, 1);
        }
      }

      requestAnimationFrame(animate);
    }

    function getPointerPosition(event) {
      if (event.touches && event.touches.length > 0) {
        return {
          x: event.touches[0].clientX,
          y: event.touches[0].clientY
        };
      }
      return {
        x: event.clientX,
        y: event.clientY
      };
    }

    canvas.addEventListener("pointerdown", (event) => {
      spawnBurst(event.clientX, event.clientY, 100);
    });

    canvas.addEventListener("touchstart", (event) => {
      event.preventDefault();
      const pos = getPointerPosition(event);
      spawnBurst(pos.x, pos.y, 100);
    }, { passive: false });

    window.addEventListener("keydown", (event) => {
      if (event.key === "c" || event.key === "C") {
        particles.length = 0;
      }
    });

    window.addEventListener("resize", resize);

    resize();
    animate();

    // Start with one burst in the middle
    spawnBurst(centerX, centerY, 140);
  </script>
</body>
</html>
