<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Triangle Swarm Lab</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #05060a;
      touch-action: none;
    }

    canvas {
      display: block;
    }

    .panel {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      color: rgba(255,255,255,0.9);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.35;
      background: rgba(0,0,0,0.28);
      padding: 12px 14px;
      border-radius: 14px;
      backdrop-filter: blur(8px);
      min-width: 240px;
    }

    .panel h1 {
      margin: 0 0 8px 0;
      font-size: 14px;
      font-weight: 600;
    }

    .row {
      margin: 8px 0;
    }

    .row label {
      display: block;
      margin-bottom: 4px;
      opacity: 0.9;
    }

    .panel select,
    .panel input[type="range"],
    .panel button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: none;
      font: inherit;
    }

    .panel select,
    .panel button {
      padding: 8px 10px;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .panel input[type="range"] {
      background: transparent;
    }

    .mini {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 8px;
    }

    .toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 25;
      border: none;
      border-radius: 999px;
      background: rgba(0,0,0,0.28);
      color: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      width: 42px;
      height: 42px;
      font-size: 18px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <button class="toggle" id="togglePanel">☰</button>

  <div class="panel" id="panel">
    <h1>Triangle Swarm Lab</h1>

    <div class="row">
      <label for="pathSelect">Attractor path</label>
      <select id="pathSelect">
        <option value="circle">Circle</option>
        <option value="figure8">Figure Eight</option>
        <option value="lissajous" selected>Lissajous</option>
        <option value="torusish">Torus-ish</option>
        <option value="chaotic">Chaotic Loop</option>
      </select>
    </div>

    <div class="row">
      <label for="spawnCount">Spawn count: <span id="spawnCountValue">100</span></label>
      <input id="spawnCount" type="range" min="20" max="220" step="1" value="100" />
    </div>

    <div class="row">
      <label for="attractStrength">Attraction: <span id="attractStrengthValue">1.8</span></label>
      <input id="attractStrength" type="range" min="0.4" max="4" step="0.1" value="1.8" />
    </div>

    <div class="row">
      <label for="flowStrength">Flow: <span id="flowStrengthValue">1.8</span></label>
      <input id="flowStrength" type="range" min="0.2" max="4" step="0.1" value="1.8" />
    </div>

    <div class="row">
      <label for="trailAmount">Trail: <span id="trailAmountValue">0.14</span></label>
      <input id="trailAmount" type="range" min="0.03" max="0.35" step="0.01" value="0.14" />
    </div>

    <div class="row">
      <button id="clearBtn">Clear</button>
    </div>

    <div class="mini">
      Tap to generate triangles. Change path live and watch the swarm reorganize.
    </div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const panel = document.getElementById("panel");
    const togglePanel = document.getElementById("togglePanel");

    const pathSelect = document.getElementById("pathSelect");
    const spawnCountSlider = document.getElementById("spawnCount");
    const attractStrengthSlider = document.getElementById("attractStrength");
    const flowStrengthSlider = document.getElementById("flowStrength");
    const trailAmountSlider = document.getElementById("trailAmount");
    const clearBtn = document.getElementById("clearBtn");

    const spawnCountValue = document.getElementById("spawnCountValue");
    const attractStrengthValue = document.getElementById("attractStrengthValue");
    const flowStrengthValue = document.getElementById("flowStrengthValue");
    const trailAmountValue = document.getElementById("trailAmountValue");

    let width = 0;
    let height = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);

    const particles = [];
    const maxParticles = 3500;

    let centerX = 0;
    let centerY = 0;
    let scaleBase = 0;

    const settings = {
      path: "lissajous",
      spawnCount: 100,
      attractStrength: 1.8,
      flowStrength: 1.8,
      trailAmount: 0.14
    };

    togglePanel.addEventListener("click", () => {
      panel.classList.toggle("hidden");
    });

    pathSelect.addEventListener("input", () => {
      settings.path = pathSelect.value;
    });

    spawnCountSlider.addEventListener("input", () => {
      settings.spawnCount = Number(spawnCountSlider.value);
      spawnCountValue.textContent = settings.spawnCount;
    });

    attractStrengthSlider.addEventListener("input", () => {
      settings.attractStrength = Number(attractStrengthSlider.value);
      attractStrengthValue.textContent = settings.attractStrength.toFixed(1);
    });

    flowStrengthSlider.addEventListener("input", () => {
      settings.flowStrength = Number(flowStrengthSlider.value);
      flowStrengthValue.textContent = settings.flowStrength.toFixed(1);
    });

    trailAmountSlider.addEventListener("input", () => {
      settings.trailAmount = Number(trailAmountSlider.value);
      trailAmountValue.textContent = settings.trailAmount.toFixed(2);
    });

    clearBtn.addEventListener("click", () => {
      particles.length = 0;
    });

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      centerX = width / 2;
      centerY = height / 2;
      scaleBase = Math.min(width, height) * 0.23;
    }

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function pathPoint(type, t) {
      const s = scaleBase;

      if (type === "circle") {
        return {
          x: centerX + Math.cos(t) * s,
          y: centerY + Math.sin(t) * s
        };
      }

      if (type === "figure8") {
        return {
          x: centerX + Math.sin(t) * s * 0.95,
          y: centerY + Math.sin(2 * t) * s * 0.75
        };
      }

      if (type === "lissajous") {
        return {
          x: centerX + Math.sin(3 * t + 0.8) * s * 0.95,
          y: centerY + Math.sin(4 * t) * s * 0.80
        };
      }

      if (type === "torusish") {
        const r = s * (0.72 + 0.24 * Math.cos(3 * t));
        return {
          x: centerX + Math.cos(2 * t) * r,
          y: centerY + Math.sin(2 * t) * r
        };
      }

      if (type === "chaotic") {
        return {
          x: centerX + (
            0.62 * Math.sin(2.1 * t) +
            0.23 * Math.sin(5.3 * t + 1.2) +
            0.15 * Math.sin(9.1 * t)
          ) * s * 1.05,
          y: centerY + (
            0.58 * Math.cos(3.2 * t + 0.4) +
            0.22 * Math.sin(6.4 * t) +
            0.16 * Math.cos(8.2 * t + 0.6)
          ) * s * 0.95
        };
      }

      return {
        x: centerX + Math.cos(t) * s,
        y: centerY + Math.sin(t) * s
      };
    }

    function nearestPathData(type, x, y) {
      let bestT = 0;
      let bestD2 = Infinity;
      let bestPoint = null;

      const samples = 220;

      for (let i = 0; i < samples; i++) {
        const t = (i / samples) * Math.PI * 2;
        const p = pathPoint(type, t);
        const dx = p.x - x;
        const dy = p.y - y;
        const d2 = dx * dx + dy * dy;

        if (d2 < bestD2) {
          bestD2 = d2;
          bestT = t;
          bestPoint = p;
        }
      }

      const eps = 0.01;
      const p1 = pathPoint(type, bestT - eps);
      const p2 = pathPoint(type, bestT + eps);

      const tx = p2.x - p1.x;
      const ty = p2.y - p1.y;
      const len = Math.hypot(tx, ty) || 1;

      return {
        point: bestPoint,
        tangentX: tx / len,
        tangentY: ty / len,
        distance: Math.sqrt(bestD2)
      };
    }

    class TriangleParticle {
      constructor(x, y, angle, speed) {
        this.x = x;
        this.y = y;

        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;

        this.ax = 0;
        this.ay = 0;

        this.size = randomRange(3, 8);
        this.age = 0;
        this.maxAge = randomRange(220, 420);

        this.heading = angle;
        this.turnAmount = 0;

        this.hueOffset = randomRange(-20, 20);
        this.pathOffset = randomRange(-1, 1);
      }

      update() {
        this.age += 1;
        this.ax = 0;
        this.ay = 0;

        const burstStrength = Math.max(0, 1 - this.age / 45);
        const burstAngle = Math.atan2(this.vy, this.vx);
        this.ax += Math.cos(burstAngle) * burstStrength * 0.03;
        this.ay += Math.sin(burstAngle) * burstStrength * 0.03;

        if (this.age > 20) {
          const data = nearestPathData(settings.path, this.x, this.y);
          const pullX = data.point.x - this.x;
          const pullY = data.point.y - this.y;

          const attract = settings.attractStrength * 0.001;
          const flow = settings.flowStrength * 0.01;

          this.ax += pullX * attract;
          this.ay += pullY * attract;

          this.ax += data.tangentX * flow;
          this.ay += data.tangentY * flow;

          const nx = -data.tangentY;
          const ny = data.tangentX;
          const orbitStrength = 0.0035 + 0.001 * this.pathOffset;

          this.ax += nx * orbitStrength;
          this.ay += ny * orbitStrength;
        }

        this.ax += randomRange(-0.006, 0.006);
        this.ay += randomRange(-0.006, 0.006);

        this.vx += this.ax;
        this.vy += this.ay;

        this.vx *= 0.985;
        this.vy *= 0.985;

        this.x += this.vx;
        this.y += this.vy;

        const newHeading = Math.atan2(this.vy, this.vx);
        let delta = newHeading - this.heading;

        while (delta > Math.PI) delta -= Math.PI * 2;
        while (delta < -Math.PI) delta += Math.PI * 2;

        this.turnAmount = Math.abs(delta);
        this.heading = newHeading;
      }

      draw() {
        const speed = Math.hypot(this.vx, this.vy);

        const fadeIn = Math.min(1, this.age / 20);
        const fadeOut = Math.max(0, 1 - this.age / this.maxAge);
        const alpha = fadeIn * fadeOut * 0.9;

        const hue = 200 + Math.min(this.turnAmount * 1200, 120) + this.hueOffset;
        const lightness = 55 + Math.min(speed * 8, 20);

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.heading);

        ctx.beginPath();
        ctx.moveTo(this.size, 0);
        ctx.lineTo(-this.size * 0.8, this.size * 0.5);
        ctx.lineTo(-this.size * 0.8, -this.size * 0.5);
        ctx.closePath();

        ctx.fillStyle = `hsla(${hue}, 85%, ${lightness}%, ${alpha})`;
        ctx.fill();

        ctx.restore();
      }

      isDead() {
        return this.age > this.maxAge;
      }
    }

    function spawnBurst(x, y, count = settings.spawnCount) {
      for (let i = 0; i < count; i++) {
        if (particles.length >= maxParticles) {
          particles.shift();
        }

        const angle = Math.random() * Math.PI * 2;
        const speed = randomRange(0.8, 3.8);
        particles.push(new TriangleParticle(x, y, angle, speed));
      }
    }

    function drawGuidePath() {
      ctx.beginPath();

      const steps = 340;
      for (let i = 0; i <= steps; i++) {
        const t = (i / steps) * Math.PI * 2;
        const p = pathPoint(settings.path, t);

        if (i === 0) {
          ctx.moveTo(p.x, p.y);
        } else {
          ctx.lineTo(p.x, p.y);
        }
      }

      ctx.strokeStyle = "rgba(255,255,255,0.03)";
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function animate() {
      ctx.fillStyle = `rgba(5, 6, 10, ${settings.trailAmount})`;
      ctx.fillRect(0, 0, width, height);

      drawGuidePath();

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        p.draw();

        if (p.isDead()) {
          particles.splice(i, 1);
        }
      }

      requestAnimationFrame(animate);
    }

    function getPointerPosition(event) {
      if (event.touches && event.touches.length > 0) {
        return {
          x: event.touches[0].clientX,
          y: event.touches[0].clientY
        };
      }

      return {
        x: event.clientX,
        y: event.clientY
      };
    }

    canvas.addEventListener("pointerdown", (event) => {
      spawnBurst(event.clientX, event.clientY, settings.spawnCount);
    });

    canvas.addEventListener("touchstart", (event) => {
      event.preventDefault();
      const pos = getPointerPosition(event);
      spawnBurst(pos.x, pos.y, settings.spawnCount);
    }, { passive: false });

    window.addEventListener("keydown", (event) => {
      if (event.key === "c" || event.key === "C") {
        particles.length = 0;
      }
    });

    window.addEventListener("resize", resize);

    resize();
    animate();
    spawnBurst(centerX, centerY, 140);
  </script>
</body>
</html>
